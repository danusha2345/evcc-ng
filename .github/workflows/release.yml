name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - "*"

jobs:
  # Run the full fork build/test/lint/ui pipeline (ubuntu-latest) before
  # publishing. The UI job caches dist/ under ${os}-${sha}-dist for the release
  # job below.
  call-build-workflow:
    if: startsWith(github.ref, 'refs/tags')
    uses: ./.github/workflows/default.yml
    permissions:
      contents: read
      actions: write

  release:
    name: GitHub Release
    needs:
      - call-build-workflow
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
        id: go

      - name: Patch ASN1
        run: make patch-asn1-sudo

      - name: Get dist from cache
        uses: actions/cache/restore@v6
        id: cache-dist
        with:
          path: dist
          key: ${{ runner.os }}-${{ github.sha }}-dist

      - name: Build UI
        if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Build UI assets
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: make install-ui ui

      - name: Create GitHub Release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser-ng.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
